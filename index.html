<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pac-Man - Classic Arcade Game</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Press Start 2P', 'Courier New', monospace;
        }
        #game-container {
            position: relative;
            border: 4px solid #1c8eff;
            box-shadow: 0 0 30px rgba(28, 142, 255, 0.5);
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 16px;
            z-index: 10;
            text-shadow: 2px 2px #000;
        }
        #ui div {
            margin: 5px 0;
        }
        #score-value { color: #ffff00; }
        #lives-value { color: #ff0000; }
        #overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
            z-index: 20;
        }
        #overlay h1 {
            color: #ffff00;
            font-size: 32px;
            text-shadow: 3px 3px #ff0000;
            margin: 0;
        }
        #overlay p {
            color: #fff;
            font-size: 14px;
            margin-top: 15px;
        }
        #instructions {
            color: #888;
            font-size: 12px;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <div>SCORE: <span id="score-value">0</span></div>
            <div>LIVES: <span id="lives-value">3</span></div>
            <div>LEVEL: <span id="level-value">1</span></div>
        </div>
        <div id="overlay">
            <h1 id="overlay-title">GAME OVER</h1>
            <p>Press SPACE to restart</p>
        </div>
    </div>
    <div id="instructions">
        Arrow Keys: Move | Collect all dots to win!
    </div>
    <script src="js/game.js"></script>
</body>
</html>
